<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2d7a4a"/>
      <stop offset="1" stop-color="#1a5c33"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#66bb6a" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#66bb6a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="64" cy="116" rx="36" ry="6" fill="#000" opacity="0.15"/>

  <!-- Phone body -->
  <rect x="32" y="8" width="64" height="112" rx="10" ry="10" fill="url(#bg)"/>

  <!-- Phone screen -->
  <rect x="38" y="20" width="52" height="88" rx="3" ry="3" fill="url(#screen)"/>

  <!-- Screen glow -->
  <rect x="38" y="20" width="52" height="88" rx="3" ry="3" fill="url(#glow)"/>

  <!-- Android robot head -->
  <ellipse cx="64" cy="48" rx="12" ry="10" fill="#66bb6a"/>
  <!-- Antennae -->
  <rect x="58" y="36" width="2" height="6" rx="1" fill="#66bb6a"/>
  <rect x="68" y="36" width="2" height="6" rx="1" fill="#66bb6a"/>
  <!-- Eyes -->
  <circle cx="59" cy="47" r="2" fill="#1a1a2e"/>
  <circle cx="69" cy="47" r="2" fill="#1a1a2e"/>

  <!-- Android body -->
  <rect x="54" y="58" width="20" height="16" rx="3" fill="#66bb6a"/>
  <!-- Arms -->
  <rect x="46" y="58" width="8" height="4" rx="2" fill="#66bb6a"/>
  <rect x="74" y="58" width="8" height="4" rx="2" fill="#66bb6a"/>
  <!-- Legs -->
  <rect x="56" y="74" width="8" height="14" rx="2" fill="#66bb6a"/>
  <rect x="64" y="74" width="8" height="14" rx="2" fill="#66bb6a"/>

  <!-- Top speaker -->
  <rect x="58" y="14" width="12" height="2" rx="1" fill="#1a5c33" opacity="0.6"/>
</svg>
